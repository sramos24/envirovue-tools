<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5FA3"/>
      <stop offset="100%" stop-color="#1F3864"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d9e2f3"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (iOS automatically masks, but we fill edge-to-edge) -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Subtle architectural grid lines for inspector feel -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="1" fill="none">
    <line x1="0"   y1="128" x2="512" y2="128"/>
    <line x1="0"   y1="256" x2="512" y2="256"/>
    <line x1="0"   y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0"   x2="128" y2="512"/>
    <line x1="256" y1="0"   x2="256" y2="512"/>
    <line x1="384" y1="0"   x2="384" y2="512"/>
  </g>

  <!-- IE monogram, centered -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="url(#textGrad)" text-anchor="middle">
    <text x="256" y="310" font-size="230" font-weight="700" letter-spacing="-8">IE</text>
  </g>

  <!-- Small accent bar under the monogram -->
  <rect x="186" y="355" width="140" height="6" fill="#7ab3d8" rx="3"/>

  <!-- Subtle shine overlay (top half lighter) -->
  <rect width="512" height="256" fill="#ffffff" opacity="0.04"/>
</svg>
